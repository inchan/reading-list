name: Process Reading List

on:
  schedule:
    - cron: '0 10 * * *'  # 매일 19:00 KST (UTC+9)
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: process-reading-list
  cancel-in-progress: false

permissions:
  contents: write
  issues: write

jobs:
  process:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup tools
        run: sudo apt-get install -y jq

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Initial setup (ensure quarantine collection exists)
        run: scripts/setup.sh
        env:
          RAINDROP_TEST_TOKEN: ${{ secrets.RAINDROP_TEST_TOKEN }}

      - name: Cleanup quarantine (10일 경과 → 휴지통)
        run: scripts/cleanup-quarantine.sh
        env:
          RAINDROP_TEST_TOKEN: ${{ secrets.RAINDROP_TEST_TOKEN }}

      - name: Cleanup pending (분류 완료된 북마크에서 #대기중 제거)
        run: scripts/cleanup-pending.sh
        env:
          RAINDROP_TEST_TOKEN: ${{ secrets.RAINDROP_TEST_TOKEN }}

      - name: Retry blocked (영구 차단 아닌 #접근불가 재시도)
        run: scripts/retry-blocked.sh
        env:
          RAINDROP_TEST_TOKEN: ${{ secrets.RAINDROP_TEST_TOKEN }}

      - name: Fetch unsorted bookmarks
        run: scripts/fetch-unsorted.sh
        env:
          RAINDROP_TEST_TOKEN: ${{ secrets.RAINDROP_TEST_TOKEN }}

      - name: Split into batches (차단 도메인 사전 필터 포함)
        run: scripts/split-batches.sh
        env:
          RAINDROP_TEST_TOKEN: ${{ secrets.RAINDROP_TEST_TOKEN }}

      - name: Apply blocked domain results
        run: |
          if [ -f tmp/result_blocked.json ]; then
            scripts/apply-results.sh tmp/result_blocked.json || echo "차단 도메인 적용 실패"
          fi
        env:
          RAINDROP_TEST_TOKEN: ${{ secrets.RAINDROP_TEST_TOKEN }}

      - name: Process batches with Claude
        run: |
          for batch in tmp/batch_*.json; do
            [ -f "$batch" ] || continue
            result_file="tmp/result_$(basename "$batch")"

            echo "=== 배치 처리: $(basename "$batch") ==="

            raw_file="tmp/raw_$(basename "$batch")"
            cat "$batch" | claude --print \
              --system-prompt "$(cat prompts/analyze-bookmarks.md)" \
              --output-format json \
              --dangerously-skip-permissions \
              --max-turns 15 \
              > "$raw_file" 2>/dev/null || { echo "배치 실패: $batch"; continue; }

            # Claude CLI JSON에서 실제 결과 추출
            jq -r '.result' "$raw_file" | sed -n '/^```json$/,/^```$/p' | sed '1d;$d' > "$result_file"
            if ! jq empty "$result_file" 2>/dev/null; then
              echo "파싱 실패: $result_file"; continue
            fi

            scripts/apply-results.sh "$result_file" || { echo "적용 실패: $result_file"; continue; }
          done
        env:
          RAINDROP_TEST_TOKEN: ${{ secrets.RAINDROP_TEST_TOKEN }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}

      - name: Generate daily index
        run: scripts/generate-index.sh
        env:
          RAINDROP_TEST_TOKEN: ${{ secrets.RAINDROP_TEST_TOKEN }}

      - name: Commit and push reports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/ config/collections.json config/blocked-domains.json
          git diff --cached --quiet && echo "변경사항 없음" && exit 0
          git commit -m "report: $(date +%Y-%m-%d) 처리 결과"
          git push
