name: Process Reading List Wiki

on:
  workflow_dispatch:
    inputs:
      collection_id:
        description: "Raindrop collection id (-1 = Unsorted, 0 = All)"
        required: false
        default: "0"
      limit:
        description: "Optional limit for raw sync (blank = all matched items)"
        required: false
        default: ""
      dry_run:
        description: "Run without committing changes"
        required: false
        default: "true"

concurrency:
  group: process-reading-list-wiki
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  process:
    runs-on: ubuntu-latest
    env:
      RAINDROP_TEST_TOKEN: ${{ secrets.RAINDROP_TEST_TOKEN }}
      COLLECTION_ID: ${{ github.event.inputs.collection_id || '0' }}
      SYNC_LIMIT: ${{ github.event.inputs.limit || '' }}
      DRY_RUN: ${{ github.event.inputs.dry_run || 'true' }}
      WIKI_SITE_URL: ${{ vars.WIKI_SITE_URL || format('https://{0}.github.io/{1}/', github.repository_owner, github.event.repository.name) }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup tools
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Sync Raindrop raw snapshots
        run: |
          args=(--collection "$COLLECTION_ID" --queue tmp/wiki-compile-queue.json)
          if [ -n "$SYNC_LIMIT" ]; then
            args+=(--limit "$SYNC_LIMIT")
          fi
          scripts/sync-raindrop-raw.sh "${args[@]}"

      - name: Report local Codex compile queue
        run: |
          queue_count="$(jq '.items | length' tmp/wiki-compile-queue.json)"
          if [ "$queue_count" -eq 0 ]; then
            echo "No new raw sources queued for local Codex compilation."
            exit 0
          fi

          echo "Queued $queue_count raw source(s) for local Codex compilation."
          echo "Compile locally with prompts/actions/wiki-compile.md, then run:"
          echo "  scripts/prepare-wiki-publish.sh --site-url \"$WIKI_SITE_URL\""

      - name: Generate wiki RSS feed
        run: |
          scripts/prepare-wiki-publish.sh \
            --site-url "$WIKI_SITE_URL" \
            --feed-output wiki/feed.xml

      - name: Validate wiki-only changes
        run: |
          if [ -d raw ]; then
            echo "Unexpected root-level raw/ directory created."
            exit 1
          fi

          bad_changes="$(
            git status --short --untracked-files=all |
              awk '
                {
                  path=$2
                  if ($1 == "R" || $1 == "RM" || $1 == "RD") { path=$4 }
                  if (path !~ /^wiki\// && path !~ /^tmp\//) { print }
                }
              '
          )"

          if [ -n "$bad_changes" ]; then
            echo "Unexpected non-wiki changes:"
            printf '%s\n' "$bad_changes"
            exit 1
          fi

      - name: Commit and push wiki state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if [ "$DRY_RUN" = "true" ]; then
            echo "Dry run enabled; showing pending changes without commit."
            git status --short
            exit 0
          fi

          git add wiki
          git diff --cached --quiet && echo "No wiki changes to commit." && exit 0
          git commit -m "Update reading-list wiki raw snapshots and RSS"
          git pull --rebase origin main || { git rebase --abort 2>/dev/null; git pull --no-rebase origin main; }
          git push
