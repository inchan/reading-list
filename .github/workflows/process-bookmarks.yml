name: Process Reading List Wiki

on:
  workflow_dispatch:
    inputs:
      collection_id:
        description: "Raindrop collection id (-1 = Unsorted, 0 = All)"
        required: false
        default: "-1"
      limit:
        description: "Sample limit for raw sync"
        required: false
        default: "3"
      dry_run:
        description: "Run without committing changes"
        required: false
        default: "true"

concurrency:
  group: process-reading-list-wiki
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  process:
    runs-on: ubuntu-latest
    env:
      RAINDROP_TEST_TOKEN: ${{ secrets.RAINDROP_TEST_TOKEN }}
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      COLLECTION_ID: ${{ github.event.inputs.collection_id || '-1' }}
      SYNC_LIMIT: ${{ github.event.inputs.limit || '3' }}
      DRY_RUN: ${{ github.event.inputs.dry_run || 'true' }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup tools
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Sync Raindrop raw snapshots
        run: |
          scripts/sync-raindrop-raw.sh \
            --collection "$COLLECTION_ID" \
            --limit "$SYNC_LIMIT" \
            --queue tmp/wiki-compile-queue.json

      - name: Compile raw sources into wiki with prompt-only skill
        run: |
          queue_count="$(jq '.items | length' tmp/wiki-compile-queue.json)"
          if [ "$queue_count" -eq 0 ]; then
            echo "No new raw sources to compile."
            exit 0
          fi

          system_prompt="$(
            printf '%s\n\n' "$(cat prompts/skills/karpathy-llm-wiki.upstream.md)"
            printf '%s\n\n' "$(cat wiki/SCHEMA.md)"
            printf '%s\n\n' "$(cat prompts/ingest-source-into-wiki.md)"
            printf '%s\n' "$(cat prompts/actions/wiki-compile.md)"
          )"

          claude --print \
            --system-prompt "$system_prompt" \
            --dangerously-skip-permissions \
            --max-turns 30 \
            "Compile the raw sources listed in tmp/wiki-compile-queue.json into the reading-list wiki. Edit repository files directly according to the prompt contracts."

      - name: Validate wiki-only changes
        run: |
          if [ -d raw ]; then
            echo "Unexpected root-level raw/ directory created."
            exit 1
          fi

          bad_changes="$(
            git status --short --untracked-files=all |
              awk '
                {
                  path=$2
                  if ($1 == "R" || $1 == "RM" || $1 == "RD") { path=$4 }
                  if (path !~ /^wiki\// && path !~ /^tmp\//) { print }
                }
              '
          )"

          if [ -n "$bad_changes" ]; then
            echo "Unexpected non-wiki changes:"
            printf '%s\n' "$bad_changes"
            exit 1
          fi

      - name: Commit and push wiki state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if [ "$DRY_RUN" = "true" ]; then
            echo "Dry run enabled; showing pending changes without commit."
            git status --short
            exit 0
          fi

          git add wiki
          git diff --cached --quiet && echo "No wiki changes to commit." && exit 0
          git commit -m "Compile reading-list wiki from raw sources"
          git pull --rebase origin main || { git rebase --abort 2>/dev/null; git pull --no-rebase origin main; }
          git push
