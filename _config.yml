title: Reading List
description: 자동 북마크 분석 보고서
baseurl: /reading-list
url: https://inchan.github.io
markdown: kramdown
kramdown:
  input: GFM
sass:
  style: compressed

defaults:
  - scope:
      path: ""
    values:
      layout: default

exclude:
  - scripts/
  - prompts/
  - config/
  - tests/
  - tmp/
  - docs/
  - autoresearch-results.tsv
  - "*.sh"
  - Gemfile
  - CLAUDE.md
  - LICENSE
