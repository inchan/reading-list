{% assign path_parts = page.path | split: '/' %}
{% assign report_date = path_parts[1] %}
<nav class="breadcrumbs" aria-label="브레드크럼">
  <ol class="breadcrumbs__list">
    <li class="breadcrumbs__item">
      <a href="{{ '/' | relative_url }}">전체 목록</a>
    </li>
    {% if include.page_type == 'day' %}
      <li class="breadcrumbs__item" aria-current="page">{{ report_date }}</li>
    {% elsif include.page_type == 'report' %}
      <li class="breadcrumbs__item">
        <a href="{{ '/reports/' | append: report_date | append: '/' | relative_url }}">{{ report_date }}</a>
      </li>
      <li class="breadcrumbs__item" aria-current="page">{{ page.title }}</li>
    {% endif %}
  </ol>
</nav>
