<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
{% capture page_title %}
  {% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}
{% endcapture %}
<title>{{ page_title | strip }}</title>
<meta name="description" content="{{ page.description | default: site.description | escape }}">
<meta name="color-scheme" content="dark light">
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pretendard/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
<script>
  (function () {
    var stored = null;
    try {
      stored = localStorage.getItem("reading-list-theme");
    } catch (error) {
      stored = null;
    }
    var systemTheme = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
    document.documentElement.setAttribute("data-theme", stored || systemTheme);
  }());
</script>
